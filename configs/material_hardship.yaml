{
  "data": {
    "version": "ICPSR 31622 DS0015 V5, Challenge DS15"
  },
  "paths": {
    "ds15_root": "../data/ds15",
    "features_path": "../data/ds15/background.csv",
    "train_outcomes_path": "../data/ds15/train.csv",
    "truth_csv_path": "",
    "truth_url": "https://raw.githubusercontent.com/fragilefamilieschallenge/codalab-competition-bundle/master/reference2/truth.csv",
    "codebook_path": "../data/ds15/codebook_FFChallenge.txt",
    "feature_dictionary_path": "feature_dictionary_material_hardship_v1.csv",
    "output_dir": "../runs/material_hardship"
  },
  "target": {
    "id_column": "challengeID",
    "name": "materialHardship",
    "split_column": "split"
  },
  "split": {
    "allow_random_fallback": false,
    "random_holdout_fraction": 0.2
  },
  "experiment": {
    "seed": 333,
    "n_jobs": 1
  },
  "preprocessing": {
    "missing_codes": [-9, -8, -7, -6, -5, -4, -3, -2, -1],
    "missing_threshold": 0.8,
    "low_variance_threshold": 1e-12,
    "imputation_strategy": ["median", "native_nan"]
  },
  "models": ["mean_baseline", "ols", "ridge", "lasso", "elastic_net", "random_forest", "xgboost", "lightgbm"],
  "learning_curve": {
    "models": ["mean_baseline", "ols", "ridge", "elastic_net"],
    "n_sizes": 10,
    "n_draws": 50,
    "min_fraction": 0.1,
    "max_fraction": 1.0,
    "bootstrap_iterations": 2000
  }
}
