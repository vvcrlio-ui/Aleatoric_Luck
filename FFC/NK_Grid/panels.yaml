model_params: model_params.yaml

_preprocessing_strategy_defaults:
  median_mode: &median_mode_defaults
    feature_manifest: data/intermediate_files/preprocessing/median_mode/feature_manifest.csv
    dataset: ffc_median_mode
    predictor_prefix: [X_, C_]
    models: [ols, ridge, lasso, elastic_net, random_forest, xgboost, lightgbm]
    preset: dev
  median_missing_indicator: &median_missing_indicator_defaults
    feature_manifest: data/intermediate_files/preprocessing/median_missing_indicator/feature_manifest.csv
    dataset: ffc_median_missing_indicator
    predictor_prefix: [X_, C_, M_]
    models: [ols, ridge, lasso, elastic_net, random_forest, xgboost, lightgbm]
    preset: dev
  tree_ordinal: &tree_ordinal_defaults
    feature_manifest: data/intermediate_files/preprocessing/tree_ordinal/feature_manifest.csv
    dataset: ffc_tree_ordinal
    predictor_prefix: [X_, C_]
    models: [xgboost, lightgbm]
    preset: dev

panels:
  - name: ffc_gpa
    data: data/intermediate_files/nk_inputs/ffc_train_gpa.csv
    test: data/intermediate_files/nk_inputs/ffc_test_gpa.csv
    feature_manifest: data/intermediate_files/ffc_background_clean_feature_manifest.csv
    dataset: ffc_background_clean_v1
    outcome: gpa
    task: regression
    predictor_prefix:
      - X_
      - C_
      - M_
    models:
      - ols
      - ridge
      - lasso
      - elastic_net
      - random_forest
      - xgboost
      - lightgbm
    # - bart
    preset: dev
    out: outputs/nk_grid_ffc_gpa.csv

  - name: ffc_grit
    data: data/intermediate_files/nk_inputs/ffc_train_grit.csv
    test: data/intermediate_files/nk_inputs/ffc_test_grit.csv
    feature_manifest: data/intermediate_files/ffc_background_clean_feature_manifest.csv
    dataset: ffc_background_clean
    outcome: grit
    task: regression
    predictor_prefix:
      - X_
      - C_
      - M_
    models:
      - ols
      - ridge
      - lasso
      - elastic_net
      - random_forest
      - xgboost
      - lightgbm
    # - bart
    preset: dev
    out: outputs/nk_grid_ffc_grit.csv

  - name: ffc_materialHardship
    data: data/intermediate_files/nk_inputs/ffc_train_materialHardship.csv
    test: data/intermediate_files/nk_inputs/ffc_test_materialHardship.csv
    feature_manifest: data/intermediate_files/ffc_background_clean_feature_manifest.csv
    dataset: ffc_background_clean
    outcome: materialHardship
    task: regression
    predictor_prefix:
      - X_
      - C_
      - M_
    models:
      - ols
      - ridge
      - lasso
      - elastic_net
      - random_forest
      - xgboost
      - lightgbm
    # - bart
    preset: dev
    out: outputs/nk_grid_ffc_materialHardship.csv

  - name: ffc_eviction
    data: data/intermediate_files/nk_inputs/ffc_train_eviction.csv
    test: data/intermediate_files/nk_inputs/ffc_test_eviction.csv
    feature_manifest: data/intermediate_files/ffc_background_clean_feature_manifest.csv
    dataset: ffc_background_clean
    outcome: eviction
    task: classification
    predictor_prefix:
      - X_
      - C_
      - M_
    models:
      - ols
      - ridge
      - lasso
      - elastic_net
      - random_forest
      - xgboost
      - lightgbm
    # - bart
    preset: dev
    out: outputs/nk_grid_ffc_eviction.csv

  - name: ffc_layoff
    data: data/intermediate_files/nk_inputs/ffc_train_layoff.csv
    test: data/intermediate_files/nk_inputs/ffc_test_layoff.csv
    feature_manifest: data/intermediate_files/ffc_background_clean_feature_manifest.csv
    dataset: ffc_background_clean
    outcome: layoff
    task: classification
    predictor_prefix:
      - X_
      - C_
      - M_
    models:
